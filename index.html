<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackRoad OS Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { background: linear-gradient(135deg, #F5A623 0%, #FF1D6C 38.2%, #9C27B0 61.8%, #2979FF 100%);
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 40px; }
    .status-card { background: #111; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #222; }
    .status-header { display: flex; justify-content: space-between; align-items: center; }
    .status-name { font-size: 1.1rem; font-weight: 500; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
    .operational { background: #0d3; color: #000; }
    .services { display: grid; gap: 12px; margin-top: 16px; }
    .service { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
    .service:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #0d3; display: inline-block; margin-right: 8px; }
    .footer { text-align: center; margin-top: 60px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BlackRoad OS</h1>
    <p class="subtitle">Infrastructure Status</p>
    
    <div class="status-card">
      <div class="status-header">
        <span class="status-name">All Systems</span>
        <span class="status-badge operational">Operational</span>
      </div>
    </div>

    <div class="status-card">
      <h3 style="margin-bottom: 16px;">Services</h3>
      <div class="services">
        <div class="service"><span><span class="dot"></span>Cloudflare Workers</span><span>200+ projects</span></div>
        <div class="service"><span><span class="dot"></span>Railway Services</span><span>3 active</span></div>
        <div class="service"><span><span class="dot"></span>GitHub Repos</span><span>1,085 repos</span></div>
        <div class="service"><span><span class="dot"></span>AI Agents</span><span>30,000 ready</span></div>
        <div class="service"><span><span class="dot"></span>KV Namespaces</span><span>35 active</span></div>
        <div class="service"><span><span class="dot"></span>Device Fleet</span><span>8 devices</span></div>
      </div>
    </div>

    <div class="footer">
      <p>Powered by BlackRoad OS, Inc.</p>
    </div>
  </div>
</body>
</html>
